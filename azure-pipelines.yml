trigger:
  branches:
    include:
      - release
  paths:
    include:
      - FCG.Catalog/**
      - FCG.Catalog/k8s/**
      - FCG.Catalog/FCG.Catalog.WebAPI/Dockerfile
      - azure-pipelines.yml

pool: 'Azure Pipelines'

variables:
  azureServiceConnection: 'FCG-FIAP(a9158924-43a8-4208-9f49-fec0ee156c66)'
  aksResourceGroup: 'GRP-FCG'
  aksClusterName: 'aks-fcg-prod'
  namespace: 'fcg-prod'

  acrName: 'acrfcgprod'
  imageRepository: 'catalogapi'
  containerName: 'catalogapi'
  containerPort: '8080'

  imageTag: '$(Build.SourceVersion)'

steps:
- checkout: self

# 1) Build/Test (.NET)
- task: UseDotNet@2
  displayName: 'Use .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '10.x'

- script: |
    set -e
    cd FCG.Catalog
    dotnet restore FCG.Catalog.slnx
    dotnet build FCG.Catalog.slnx --configuration Release --no-restore
    dotnet test  FCG.Catalog.slnx --configuration Release --no-build
  displayName: 'Build & Test'

# 2) Build + Push imagem
- task: AzureCLI@2
  displayName: 'Docker build & push (ACR)'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e

      az acr login --name $(acrName)

      IMAGE="$(acrName).azurecr.io/$(imageRepository):$(imageTag)"
      echo "Building image: $IMAGE"

      cd FCG.Catalog
      docker build -t "$IMAGE" -f FCG.Catalog.WebAPI/Dockerfile .
      docker push "$IMAGE"

# 3) Deploy no AKS + auditoria
- task: AzureCLI@2
  displayName: 'Deploy to AKS (Rolling Update)'
  inputs:
    azureSubscription: '$(azureServiceConnection)' 
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e

      az aks get-credentials \
        --resource-group $(aksResourceGroup) \
        --name $(aksClusterName) \
        --overwrite-existing

      cd FCG.Catalog

      # 0) Namespace
      kubectl get ns $(namespace) || kubectl apply -f k8s/namespace.yaml

      # 1) ConfigMap + SecretProviderClass (Key Vault CSI)
      if [ -f k8s/configmap.yaml ]; then
        kubectl apply -n $(namespace) -f k8s/configmap.yaml
      fi

      if [ -f k8s/secretproviderclass.yaml ]; then
        kubectl apply -n $(namespace) -f k8s/secretproviderclass.yaml
      fi

      # 2) Service + Ingress
      kubectl apply -n $(namespace) -f k8s/service.yaml
      if [ -f k8s/ingress.yaml ]; then
        kubectl apply -n $(namespace) -f k8s/ingress.yaml
      fi

      # 3) Deployment
      kubectl apply -n $(namespace) -f k8s/deployment.yaml

      # 4) Troca a imagem com TAG IMUTÁVEL
      IMAGE="$(acrName).azurecr.io/$(imageRepository):$(imageTag)"
      echo "Setting image: $IMAGE"
      kubectl set image -n $(namespace) deployment/$(containerName) \
        $(containerName)="$IMAGE"

      # 5) Rollout + auditoria
      ROLL_OUT_TIMEOUT="60s"
      echo "== Rollout status (timeout=$ROLL_OUT_TIMEOUT) =="
      kubectl rollout status -n $(namespace) deployment/$(containerName) --timeout=$ROLL_OUT_TIMEOUT || {
        echo ""
        echo "============================"
        echo "❌ ROLLOUT FAIL"
        echo "Coletando auditoria/diagnóstico..."
        echo "============================"

        echo ""
        echo "== Deploy describe =="
        kubectl describe deployment/$(containerName) -n $(namespace) || true

        echo ""
        echo "== ReplicaSets =="
        kubectl get rs -n $(namespace) -l app=$(containerName) -o wide || true

        echo ""
        echo "== Pods (wide) =="
        kubectl get pods -n $(namespace) -l app=$(containerName) -o wide || true

        echo ""
        echo "== Events (últimos 60) =="
        kubectl get events -n $(namespace) --sort-by=.metadata.creationTimestamp | tail -n 60 || true

        echo ""
        echo "== Pod não-ready (tentando pegar 1) =="
        BADPOD=$(kubectl get pods -n $(namespace) -l app=$(containerName) --no-headers 2>/dev/null | awk '$2 != "1/1" && $2 != "2/2" {print $1; exit}')
        if [ -n "$BADPOD" ]; then
          echo "Pod problema: $BADPOD"
          echo ""
          echo "== Describe Pod ($BADPOD) =="
          kubectl describe pod -n $(namespace) "$BADPOD" || true
          echo ""
          echo "== Logs atuais ($BADPOD) =="
          kubectl logs -n $(namespace) "$BADPOD" --tail=200 || true
          echo ""
          echo "== Logs anteriores (se restart) ($BADPOD) =="
          kubectl logs -n $(namespace) "$BADPOD" -p --tail=200 || true
        else
          echo "Nenhum pod 'não-ready' identificado."
        fi

        exit 1
      }

      echo "✅ Rollout concluído."
      kubectl get pods -n $(namespace) -l app=$(containerName) -o wide
